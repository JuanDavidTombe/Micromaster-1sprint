    <div class="sidebar-section">
      <div class="sidebar-label">Módulos</div>

      <div class="nav-item active" id="nav-inventario" onclick="showPage('inventario')">
        <span class="nav-icon">📦</span>
        <span>Inventario</span>
      </div>

      <div class="nav-item" id="nav-envios" onclick="showPage('envios')">
        <span class="nav-icon">🚚</span>
        <span>Envíos</span>
      </div>
    </div>

  </aside>

  <div class="main">

    <header class="topbar">
      <h1 class="page-heading" id="page-title">Inventario</h1>
      <div class="topbar-date" id="fecha-hoy"></div>
    </header>

    <div class="content">

      <section class="page active" id="page-inventario">

        <div class="stats-row" id="stats-inv"></div>

        <div class="toolbar">
          <div class="search-box">
            <input
              type="text"
              id="search-inv"
              placeholder="Buscar insumo, categoría o proveedor..."
              oninput="renderInventario()">
          </div>

          <select id="filter-cat" onchange="renderInventario()">
            <option value="">Todas las categorías</option>
            <option>Lácteos</option>
            <option>Cereales</option>
            <option>Proteínas</option>
            <option>Vegetales</option>
            <option>Bebidas</option>
            <option>Condimentos</option>
          </select>

          <select id="filter-estado-inv" onchange="renderInventario()">
            <option value="">Todos los estados</option>
            <option>Disponible</option>
            <option>Bajo stock</option>
            <option>Agotado</option>
          </select>

          <button class="btn btn-primary" onclick="openModalInv()">
            + Agregar
          </button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="sortInv('nombre')">Insumo ↕</th>
                <th onclick="sortInv('categoria')">Categoría ↕</th>
                <th onclick="sortInv('cantidad')">Cantidad ↕</th>
                <th>Stock</th>
                <th onclick="sortInv('precio')">Precio/u ↕</th>
                <th>Estado</th>
                <th>Vencimiento</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="inv-tbody"></tbody>
          </table>
        </div>

      </section>

      <section class="page" id="page-envios">

        <div class="stats-row" id="stats-env"></div>

        <div class="toolbar">
          <div class="search-box">
            <input
              type="text"
              id="search-env"
              placeholder="Buscar por ID o destino..."
              oninput="renderEnvios()">
          </div>

          <select id="filter-estado-env" onchange="renderEnvios()">
            <option value="">Todos los estados</option>
            <option>Pendiente</option>
            <option>En tránsito</option>
            <option>Entregado</option>
            <option>Cancelado</option>
          </select>

          <button class="btn btn-primary" onclick="openModalEnv()">
            + Nuevo Envío
          </button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="sortEnv('id')">ID ↕</th>
                <th onclick="sortEnv('destino')">Destino ↕</th>
                <th>Insumos</th>
                <th onclick="sortEnv('fecha')">Fecha ↕</th>
                <th onclick="sortEnv('total')">Total ↕</th>
                <th>Estado</th>
                <th>Progreso</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="env-tbody"></tbody>
          </table>
        </div>

      </section>


    </div>
  </div>

  <div class="modal-overlay" id="modal-inv">
    <div class="modal">

      <div class="modal-header">
        <div class="modal-title" id="modal-inv-title">Agregar Insumo</div>
        <button class="modal-close" onclick="closeModal('modal-inv')">×</button>
      </div>

      <div class="form-grid">

        <div class="field span2">
          <label for="inv-nombre">Nombre del insumo</label>
          <input type="text" id="inv-nombre" placeholder="Ej: Leche entera">
        </div>

        <div class="field">
          <label for="inv-cat">Categoría</label>
          <select id="inv-cat">
            <option>Lácteos</option>
            <option>Cereales</option>
            <option>Proteínas</option>
            <option>Vegetales</option>
            <option>Bebidas</option>
            <option>Condimentos</option>
          </select>
        </div>

        <div class="field">
          <label for="inv-unidad">Unidad de medida</label>
          <select id="inv-unidad">
            <option>Kg</option>
            <option>L</option>
            <option>Unidad</option>
            <option>Caja</option>
            <option>Bolsa</option>
            <option>Lata</option>
          </select>
        </div>

        <div class="field">
          <label for="inv-cantidad">Cantidad actual</label>
          <input type="number" id="inv-cantidad" placeholder="0" min="0">
        </div>

        <div class="field">
          <label for="inv-minimo">Stock mínimo</label>
          <input type="number" id="inv-minimo" placeholder="0" min="0">
        </div>

        <div class="field">
          <label for="inv-maximo">Stock máximo</label>
          <input type="number" id="inv-maximo" placeholder="100" min="0">
        </div>

        <div class="field">
          <label for="inv-precio">Precio por unidad ($)</label>
          <input type="number" id="inv-precio" placeholder="0.00" step="0.01">
        </div>

        <div class="field">
          <label for="inv-vencimiento">Fecha de vencimiento</label>
          <input type="date" id="inv-vencimiento">
        </div>

        <div class="field span2">
          <label for="inv-proveedor">Proveedor</label>
          <input type="text" id="inv-proveedor" placeholder="Nombre del proveedor">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-inv')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveInsumo()">Guardar</button>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="modal-env">
    <div class="modal">

      <div class="modal-header">
        <div class="modal-title">Nuevo Envío</div>
        <button class="modal-close" onclick="closeModal('modal-env')">×</button>
      </div>

      <div class="form-grid">

        <div class="field span2">
          <label for="env-destino">Destino / Cliente</label>
          <input type="text" id="env-destino" placeholder="Ej: Restaurante El Sabor">
        </div>

        <div class="field">
          <label for="env-fecha">Fecha de envío</label>
          <input type="date" id="env-fecha">
        </div>

        <div class="field">
          <label for="env-estado">Estado inicial</label>
          <select id="env-estado">
            <option>Pendiente</option>
            <option>En tránsito</option>
            <option>Entregado</option>
          </select>
        </div>

        <div class="field span2">
          <label>Insumos incluidos</label>
          <div
            id="env-insumos-list"
            style="display:flex;flex-direction:column;gap:7px;
                   max-height:150px;overflow-y:auto;padding:2px 0">
          </div>
          <button
            class="btn btn-outline btn-sm"
            style="margin-top:6px;width:fit-content"
            onclick="addInsumoLine()">
            + Agregar insumo
          </button>
        </div>

        <div class="field span2">
          <label for="env-notas">Notas del envío</label>
          <textarea
            id="env-notas"
            placeholder="Instrucciones especiales, temperatura requerida, etc.">
          </textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-env')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEnvio()">Crear Envío</button>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="modal-env-detail">
    <div class="modal" style="width:520px">

      <div class="modal-header">
        <div class="modal-title">Detalle del Envío</div>
        <button class="modal-close" onclick="closeModal('modal-env-detail')">×</button>
      </div>

      <div id="env-detail-content"></div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-env-detail')">Cerrar</button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-icon">✓</span>
    <span id="toast-msg">Operación exitosa</span>
  </div>

  <script src="app.js"></script>

</body>
</html>
